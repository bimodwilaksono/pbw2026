<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - My Daily Journal</title>
  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <navbar-component></navbar-component>

  <main class="container py-5">
    <h1 class="text-center fw-bold mb-5">Articles</h1>

    <!-- Container for dynamic cards -->
    <div id="article-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 text-center">
      <!-- Cards will be injected here -->
    </div>
  </main>

  <!-- Footer Component -->
  <footer-component></footer-component>

  <script>
    const articles = [
      {
        title: "Perpustakaan Kampus",
        text: "This is a wider card with supporting text below as a natural lead-in to additional content. This content is a little bit longer.",
        updated: "3 mins ago",
        src: "https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      },
      {
        title: "Ruang Kelas",
        text: "This card has supporting text below as a natural lead-in to additional content.",
        updated: "3 mins ago",
        src: "https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      },
      {
        title: "Kelompok Belajar",
        text: "This is a wider card with supporting text below as a natural lead-in to additional content. This card has even longer content than the first to show that equal height action.",
        updated: "3 mins ago",
        src: "https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      },
      {
        title: "Ruang Kelas",
        text: "This card has supporting text below as a natural lead-in to additional content.",
        updated: "3 mins ago",
        src: "https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      }
    ];

    const container = document.getElementById('article-container');

    articles.forEach(article => {
      const cardHtml = `
        <div class="col">
          <div class="card h-100 shadow-sm border">
            <img src="${article.src}" alt="${article.title}" class="card-img-top">
            <div class="card-body">
              <h5 class="card-title fw-bold">${article.title}</h5>
              <p class="card-text text-secondary small">${article.text}</p>
            </div>
            <div class="card-footer bg-white border-top pb-3">
              <small class="text-muted">Last updated ${article.updated}</small>
            </div>
          </div>
        </div>
      `;
      container.innerHTML += cardHtml;
    });

  </script>

  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
